<div class="container">
  <div class="indicator-container">
    <div class="indicator-label">MEDTRACKER / H2O2</div>
  </div>

  <div class="indicator-description-container">
    <div class="indicator-description">Vermelho (Red) -&gt; Amarelo/Laranja (Yellow/Orange)</div>
  </div>


  <div class="content-container" id="content-container">
    <div class="row first-row row-no-border">
      <div class="column column-10 align-start justify-center">
        <span nome-variavel="@@tag.material.name@@" class="variable font-weight-700 font-size-auto width-90 break-line-2 line-height-1">Material</span>
        <span nome-variavel="@@tag.materialsQuantityRatio@@" class="variable font-weight-700 font-size-10 variable-vertical-fixed">Qtd</span>
      </div>

      <div class="column column-2 align-center justify-center no-border">
        <img src="https://medtracker-etiquetagem.com.br/images/logos/cmes/medtracker.svg" class="logo" />
      </div>
    </div>

    <div class="row second-row">
      <div class="column column-5 align-center justify-center">
        <span class="title">Data do Ciclo</span>
        <span nome-variavel="@@tag.cycle.dateTime@@" class="variable">Data do ciclo</span>
      </div>

      <div class="column column-3 align-center justify-center">
        <span class="title">Lote</span>
        <span nome-variavel="@@tag.cycle.batch@@" class="variable">Lote</span>
      </div>

      <div class="column column-4 align-center justify-center no-border">
        <span class="title">Validade</span>
        <span nome-variavel="@@tag.expirationDate@@" class="variable">Validade</span>
      </div>
    </div>

    <div class="row third-row">
      <div class="column column-4 align-center justify-center">
        <span class="title">Equipamento</span>
        <span nome-variavel="@@tag.cycle.equipament.name@@" class="variable">Equipamento</span>
      </div>

      <div class="column column-4 align-center justify-center">
        <span class="title">Ciclo</span>
        <span nome-variavel="@@tag.cycle.cycleType.name@@" class="variable">Ciclo</span>
      </div>

      <div class="column column-4 align-center justify-center no-border">
        <span class="title">Colab | Coren</span>
        <div class="variable-line">
          <div class="column column-6 align-center justify-center no-border">
            <span nome-variavel="@@tag.user.name@@" class="variable break-line-2">Colab</span>
          </div>
          <span>|</span>
          <div class="column column-5 align-center justify-center no-border">
            <span nome-variavel="@@tag.user.coren@@" class="variable break-line-2">Coren</span>
          </div>
        </div>
      </div>
    </div>

    <div class="row fourth-row no-border">
      <div class="column column-3 align-center justify-center">
        <span class="title">Médico</span>
        <span nome-variavel="@@tag.doctor.name@@" class="variable break-line-2">Médico</span>
      </div>

      <div class="column column-4 align-center justify-center">
        <span class="title">Terceiro</span>
        <span nome-variavel="@@tag.owner.name@@" class="variable break-line-2">Terceiro</span>
      </div>

      <div class="column column-3 align-center justify-center">
        <span class="title">Paciente</span>
        <span nome-variavel="@@tag.patient.name@@" class="variable break-line-2">Paciente</span>
      </div>

      <div class="column column-2 align-center justify-center no-border">
        <img src="https://bwipjs-api.metafloor.com/?bcid=datamatrixrectangular&text=1234567890&scale=2" id="qr_code" width="80%" height="auto" />
        <span nome-variavel="@@tag.id@@" class="variable font-weight-700 font-size-11">ID</span>
      </div>
    </div>
  </div>
  <div class="site-container">
    <div class="site-label">www.medtracker.com.br</div>
